<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #fff;
      padding: 2rem 1rem;
    }
    .slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 640px;
      padding: 2.5rem 0;
    }
    .slot + .slot { border-top: 1px solid #eee; }
    .word-block {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      font-size: 48px;
      letter-spacing: 4px;
      margin-bottom: 2rem;
      color: #1a1a1a;
    }
    .context-block {
      font-family: Georgia, serif;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 1rem;
      color: #1a1a1a;
    }
    .inline-word { display: inline; letter-spacing: 2px; }
    .blank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      padding: 0 4px;
      border-bottom: 2.5px solid #888;
      color: #1a1a1a;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 2px;
      line-height: 1.15;
    }
    .word-block .blank { min-width: 20px; font-size: 14px; }
    .blank.correct { border-color: #3a7d1e; color: #3a7d1e; }
    .blank.wrong   { border-color: #c0392b; color: #c0392b; }
    .options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .opt {
      font-family: Georgia, serif;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 8px 16px;
      border: 1.5px solid #ccc;
      border-radius: 10px;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .opt:hover:not(:disabled) { background: #f5f5f5; border-color: #aaa; }
    .opt:active:not(:disabled) { transform: scale(0.97); }
    .opt:disabled { cursor: default; }
    .opt.correct { background: #eaf5e0; border-color: #5aad2e; color: #2e6e10; }
    .opt.wrong   { background: #fdecea; border-color: #e05c52; color: #b02a22; }
    .text-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 0.5rem;
      align-items: center;
    }
    .text-input {
      font-family: Georgia, serif;
      font-size: 10px;
      letter-spacing: 3px;
      border: none;
      border-bottom: 2px solid #ccc;
      background: transparent;
      color: #1a1a1a;
      padding: 4px 8px;
      outline: none;
      min-width: 180px; max-width: 100%;
      text-align: center;
      transition: border-color 0.15s;
    }
    .text-input:focus { border-color: #888; }
    .text-input:disabled { color: #aaa; }
    .check-btn {
      font-family: -apple-system, sans-serif;
	    font-size: 10px;
	    padding: 8px 16px;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #555;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .check-btn:hover:not(:disabled) { background: #f5f5f5; border-color: #aaa; }
    .check-btn:disabled { cursor: default; color: #bbb; border-color: #eee; }
    .feedback {
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      min-height: 20px;
      color: #888;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .feedback.correct { color: #2e6e10; }
    .feedback.wrong   { color: #b02a22; }
    .retry {
      display: none;
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #555;
      cursor: pointer;
      margin-bottom: 0.5rem;
    }
    .retry:hover { background: #f5f5f5; }
    .retry.show { display: block; }
    .saving {
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      color: #bbb;
      min-height: 16px;
      text-align: center;
    }
    .error-msg {
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      color: #b02a22;
      text-align: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
<script>
  const BIN_ID  = '69eface236566621a8fa7fea';
  const API_KEY = '$2a$10$Cnxn6xpCSfkvNSaRtOd94eMGAUlFzI0FeFdC0IIDtTOc92eWq7PXS';

  const p            = new URLSearchParams(location.search);
  const student      = p.get('student') ?? '';
  const exerciseBase = p.get('exercise') ?? '';
  const noRetry      = p.get('noRetry') === '1';

  const slots = [];
  let i = 1;
  while (p.get(`answer${i}`)) {
    const prefix  = p.get(`prefix${i}`)  ?? '';
    const suffix  = p.get(`suffix${i}`)  ?? '';
    const answer  = p.get(`answer${i}`);
    const options = (p.get(`options${i}`) ?? '').split(',').map(s => s.trim()).filter(Boolean);
    const context = p.get(`context${i}`) ?? '';
    const type    = p.get(`type${i}`) === 'text' ? 'text' : 'options';
    const fullWord = prefix + answer + suffix;
    const exercise = exerciseBase ? `${exerciseBase}_${i}` : `${fullWord}_${i}`;
    slots.push({ prefix, suffix, answer, options, context, type, exercise, attempts: 0 });
    i++;
  }

  if (!student || slots.length === 0 || slots.some(s =>
    !s.answer || (s.type === 'options' && s.options.length < 2)
  )) {
    document.body.innerHTML = '<p class="error-msg">Missing parameters.<br>Required: answer1, student; options1 (min 2) for options slots</p>';
  } else {
    document.body.innerHTML = slots.map((slot, idx) => buildSlot(slot, idx)).join('');
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function buildBlank(idx) {
    return `<span class="blank" id="blank-${idx}">_</span>`;
  }

  function buildSlot(slot, idx) {
    let topHtml;
    if (slot.context && slot.context.includes('{word}')) {
      const inlineWord = `<span class="inline-word">${esc(slot.prefix)}${buildBlank(idx)}${esc(slot.suffix)}</span>`;
      topHtml = `<div class="context-block">${esc(slot.context).replace('{word}', inlineWord)}</div>`;
    } else {
      topHtml = `<div class="word-block"><span>${esc(slot.prefix)}</span>${buildBlank(idx)}<span>${esc(slot.suffix)}</span></div>`;
    }

    let interactionHtml;
    if (slot.type === 'text') {
      interactionHtml = `<div class="text-input-row">
        <input class="text-input" id="text-input-${idx}" type="text" placeholder="type your answer…"
          onkeydown="if(event.key==='Enter')checkText(${idx})">
        <button class="check-btn" id="check-btn-${idx}" onclick="checkText(${idx})">Check</button>
      </div>`;
    } else {
      interactionHtml = `<div class="options">${slot.options.map(o =>
        `<button class="opt" data-choice="${escAttr(o)}" onclick="check(${idx},this,this.dataset.choice)">${esc(o)}</button>`
      ).join('')}</div>`;
    }

    const retryBtn = noRetry ? '' : `<button class="retry" id="retry-${idx}" onclick="reset(${idx})">Try again</button>`;

    return `<div class="slot" id="slot-${idx}">
      ${topHtml}
      ${interactionHtml}
      <div class="feedback" id="fb-${idx}"></div>
      ${retryBtn}
      <div class="saving" id="saving-${idx}"></div>
    </div>`;
  }

  let saveQueue = Promise.resolve();

  function saveResult(idx, chosen, isCorrect) {
    saveQueue = saveQueue.then(() => _doSave(idx, chosen, isCorrect));
  }

  async function _doSave(idx, chosen, isCorrect) {
    const slot   = slots[idx];
    const saving = document.getElementById(`saving-${idx}`);
    saving.textContent = 'saving…';
    try {
      const getRes  = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
      const data    = await getRes.json();
      const current = data.record ?? {};
      if (!current[slot.exercise]) current[slot.exercise] = {};
      current[slot.exercise][student] = {
        correct: isCorrect, chosenAnswer: chosen,
        attempts: slot.attempts, lastAttempt: new Date().toISOString()
      };
      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify(current)
      });
      saving.textContent = '';
    } catch {
      saving.textContent = 'could not save result';
    }
  }

  function check(idx, btn, choice) {
    const slot = slots[idx];
    slot.attempts++;
    document.querySelectorAll(`#slot-${idx} .opt`).forEach(b => b.disabled = true);
    const blank     = document.getElementById(`blank-${idx}`);
    const fb        = document.getElementById(`fb-${idx}`);
    const isCorrect = choice === slot.answer;
    blank.textContent = choice;
    if (isCorrect) {
      btn.classList.add('correct');
      blank.classList.add('correct');
      fb.textContent = `Correct! The word is "${slot.prefix}${slot.answer}${slot.suffix}"`;
      fb.className = 'feedback correct';
    } else {
      btn.classList.add('wrong');
      blank.classList.add('wrong');
      fb.textContent = 'Not quite — try again!';
      fb.className = 'feedback wrong';
    }
    if (!noRetry) document.getElementById(`retry-${idx}`)?.classList.add('show');
    saveResult(idx, choice, isCorrect);
  }

  function checkText(idx) {
    const slot     = slots[idx];
    const input    = document.getElementById(`text-input-${idx}`);
    const checkBtn = document.getElementById(`check-btn-${idx}`);
    const choice   = input.value;
    if (!choice.trim()) return;
    slot.attempts++;
    input.disabled    = true;
    checkBtn.disabled = true;
    const blank     = document.getElementById(`blank-${idx}`);
    const fb        = document.getElementById(`fb-${idx}`);
    const isCorrect = choice.trim().toLowerCase() === slot.answer.toLowerCase();
    blank.textContent = choice.trim();
    if (isCorrect) {
      blank.classList.add('correct');
      fb.textContent = `Correct! The word is "${slot.prefix}${slot.answer}${slot.suffix}"`;
      fb.className = 'feedback correct';
    } else {
      blank.classList.add('wrong');
      fb.textContent = 'Not quite — try again!';
      fb.className = 'feedback wrong';
    }
    if (!noRetry) document.getElementById(`retry-${idx}`)?.classList.add('show');
    saveResult(idx, choice.trim(), isCorrect);
  }

  function reset(idx) {
    const slot = slots[idx];
    if (slot.type === 'text') {
      const input = document.getElementById(`text-input-${idx}`);
      input.value    = '';
      input.disabled = false;
      document.getElementById(`check-btn-${idx}`).disabled = false;
      input.focus();
    } else {
      document.querySelectorAll(`#slot-${idx} .opt`).forEach(b => { b.disabled = false; b.className = 'opt'; });
    }
    const blank = document.getElementById(`blank-${idx}`);
    blank.textContent = '_';
    blank.className = 'blank';
    const fb = document.getElementById(`fb-${idx}`);
    fb.textContent = '';
    fb.className = 'feedback';
    document.getElementById(`retry-${idx}`)?.classList.remove('show');
  }
</script>
</body>
</html>
